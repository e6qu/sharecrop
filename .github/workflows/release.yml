name: Release

# On every merge to main, compute the next version from conventional commits
# (patch by default; feat -> minor; !/BREAKING -> major), build and publish the
# multi-arch backend image to the GitHub Container Registry, tag the release, and
# prune old images to the newest 25. No :latest tag - deployments pin a version.
on:
  push:
    branches: [main]

# Serialize releases so two merges cannot race on the version/tag.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # push the version tag + create the GitHub release
  packages: write # push images to ghcr.io

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0 # full history + tags for conventional-commit versioning
      - id: compute
        run: |
          version="$(tools/next_version.sh)"
          if [ -z "${version}" ]; then
            echo "next_version.sh produced no version (unexpected)" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release version: ${version}"

  build:
    needs: version
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: amd64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
      # A docker-container builder is required to push directly from buildx.
      - run: docker buildx create --use --name sharecrop-ci
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push ${{ matrix.arch }} image
        run: tools/build_container.sh "ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}" "${{ matrix.arch }}"

  manifest:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Assemble the multi-arch manifest
        run: tools/build_container.sh "ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}" manifest

  release:
    needs: [version, manifest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Tag the release and publish notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.version.outputs.version }}"
          git tag "${version}"
          git push origin "${version}"
          gh release create "${version}" --title "${version}" --generate-notes

  # Best-effort: keep the registry from growing without bound. Runs after the new
  # image is published so it counts toward the newest 25 kept releases. A failure
  # (e.g. token scope) must not fail the release.
  prune:
    needs: [version, manifest]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Prune old images (keep newest 25)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tools/prune_ghcr_versions.sh "${{ github.repository_owner }}" "${{ github.event.repository.name }}" 25
