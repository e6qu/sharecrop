name: Release

# Every main commit publishes exactly one immutable 12-character commit-SHA tag,
# its two direct architecture images, and no mutable branch or latest tags.
on:
  push:
    branches: [main]

# Serialize releases so two merges cannot race on the version/tag.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  packages: write # push images to ghcr.io

jobs:
  metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.revision.outputs.tag }}
    steps:
      - id: revision
        env:
          REVISION: ${{ github.sha }}
        run: |
          tag="${REVISION:0:12}"
          if [[ ! "$tag" =~ ^[0-9a-f]{12}$ ]]; then
            echo "invalid immutable image tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release image tag: $tag"

  build:
    needs: metadata
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: amd64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      # A docker-container builder is required to push directly from buildx.
      - run: docker buildx create --use --name sharecrop-ci
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push ${{ matrix.arch }} image
        run: tools/build_container.sh "ghcr.io/${{ github.repository }}:${{ needs.metadata.outputs.tag }}" "${{ matrix.arch }}"

  manifest:
    needs: [metadata, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Assemble and verify the multi-architecture manifest
        run: tools/build_container.sh "ghcr.io/${{ github.repository }}:${{ needs.metadata.outputs.tag }}" manifest

  prune:
    needs: [metadata, manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Prune old images (keep newest 20)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tools/prune_ghcr_versions.sh "${{ github.repository_owner }}" "${{ github.event.repository.name }}" 20
