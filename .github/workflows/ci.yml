name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: v2.8.3
      - name: Check formatting
        run: make check-format
      - name: Check contracts
        run: make check-contracts
      - name: Check OpenAPI document
        run: make check-openapi
      - name: Check project policy
        run: make check-policy
      - name: Check TypeScript
        run: make check-ts
      - name: Lint
        run: make lint
      - name: Vet
        run: make vet

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: v2.8.3
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.x"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit hooks (copy-paste + dead code)
        run: pre-commit run --all-files --show-diff-on-failure

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: v2.8.3
      - name: Unit tests
        run: make test

  build:
    runs-on: ubuntu-latest
    env:
      ELM_BIN: /usr/local/bin/elm
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: v2.8.3
      - name: Install Elm
        run: |
          curl -L https://github.com/elm/compiler/releases/download/0.19.1/binary-for-linux-64-bit.gz -o elm.gz
          gunzip elm.gz
          chmod +x elm
          sudo mv elm /usr/local/bin/elm
      - name: Build frontend and binary
        run: make build

  wasm-scenario-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: v2.8.3
      - name: WASM demo backend scenario parity
        run: make check-wasm-scenario-parity

  db-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: sharecrop
          POSTGRES_USER: sharecrop
          POSTGRES_PASSWORD: sharecrop
        ports:
          - 25432:5432
        options: >-
          --health-cmd "pg_isready -U sharecrop -d sharecrop"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://sharecrop:sharecrop@localhost:25432/sharecrop?sslmode=disable
      SHARECROP_HTTP_ADDR: :29180
      SHARECROP_ACCESS_TOKEN_SECRET: "01234567890123456789012345678901"
      SHARECROP_MIGRATIONS_DIR: ${{ github.workspace }}/migrations
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: v2.8.3
      - name: Database-backed runtime checks
        run: make db-checks

  playwright:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: sharecrop
          POSTGRES_USER: sharecrop
          POSTGRES_PASSWORD: sharecrop
        ports:
          - 25432:5432
        options: >-
          --health-cmd "pg_isready -U sharecrop -d sharecrop"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://sharecrop:sharecrop@localhost:25432/sharecrop?sslmode=disable
      ELM_BIN: /usr/local/bin/elm
      SHARECROP_HTTP_ADDR: :29180
      SHARECROP_PLAYWRIGHT_API_PORT: "29180"
      SHARECROP_PLAYWRIGHT_DEMO_PORT: "29181"
      SHARECROP_PLAYWRIGHT_DEMO_ORIGIN: http://127.0.0.1:29181
      SHARECROP_ACCESS_TOKEN_SECRET: "01234567890123456789012345678901"
      SHARECROP_MIGRATIONS_DIR: ${{ github.workspace }}/migrations
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: v2.8.3
      - name: Install Elm
        run: |
          curl -L https://github.com/elm/compiler/releases/download/0.19.1/binary-for-linux-64-bit.gz -o elm.gz
          gunzip elm.gz
          chmod +x elm
          sudo mv elm /usr/local/bin/elm
      - name: Install Playwright Chromium
        run: deno run --allow-env --allow-read --allow-write --allow-run --allow-net --allow-sys npm:playwright@1.61.0 install chromium
      - name: Build frontend
        run: make frontend
      - name: Run migrations
        run: make migrate-up
      - name: Playwright UI end-to-end tests
        run: make e2e-ui
