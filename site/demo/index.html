<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sharecrop Demo</title>
    <script>
      (() => {
        const parts = window.location.pathname.split("/");
        const demoIndex = parts.indexOf("demo");
        // Rebuild the base path from only the safe path segments up to and
        // including "demo". Dropping empty segments and forcing a single
        // leading slash prevents a crafted URL such as //evil.com/demo/ from
        // producing a protocol-relative <base href> that would load the
        // demo's scripts from an attacker origin. Segments are also
        // restricted to a conservative character set as defense in depth.
        const safe = /^[A-Za-z0-9._~-]+$/;
        const basePath = demoIndex === -1
          ? "./"
          : "/" +
            parts
              .slice(0, demoIndex + 1)
              .filter((segment) =>
                segment !== "" && segment !== "." && segment !== ".." &&
                safe.test(segment)
              )
              .join("/") + "/";
        const base = document.createElement("base");
        base.setAttribute("href", basePath);
        document.head.appendChild(base);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
    >
    <link rel="stylesheet" href="./app.css">
    <link rel="stylesheet" href="./arcade.css">
  </head>
  <body>
    <main id="app"></main>
    <script src="./elm.js"></script>
    <script src="./wasm-host.js"></script>
    <script>
      const boot = async () => {
        const params = new URLSearchParams(window.location.search);
        const backend = params.get("backend") || "wasm";
        if (backend === "wasm") {
          await window.SharecropWasmDemo.install({
            wasmExecURL: "./wasm_exec.js",
            wasmURL: "./sharecrop-wasm-backend.wasm",
          });
        } else {
          throw new Error("unknown Sharecrop demo backend: " + backend);
        }

        const pageOrigin = window.location.origin;
        const app = Elm.Main.init({
          node: document.getElementById("app"),
          flags: {
            origin: pageOrigin && pageOrigin !== "null"
              ? pageOrigin
              : "https://sharecrop.example",
            demo: true,
          },
        });
        app.ports.copyToClipboard.subscribe((t) => {
          if (navigator.clipboard) navigator.clipboard.writeText(t);
        });
        app.ports.reloadDemo.subscribe(() => window.location.reload());
      };
      boot().catch((error) => {
        console.error(error);
        document.getElementById("app").textContent = error.message;
      });
    </script>
  </body>
</html>
