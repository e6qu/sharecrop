<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sharecrop Demo</title>
    <script>
      (() => {
        const parts = window.location.pathname.split("/");
        const demoIndex = parts.indexOf("demo");
        const basePath = demoIndex === -1
          ? "./"
          : parts.slice(0, demoIndex + 1).join("/") + "/";
        document.write(`<base href="${basePath}">`);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
    >
    <link rel="stylesheet" href="./app.css">
    <link rel="stylesheet" href="./arcade.css">
  </head>
  <body>
    <main id="app"></main>
    <script src="./elm.js"></script>
    <script src="./wasm-host.js"></script>
    <script>
      const boot = async () => {
        const params = new URLSearchParams(window.location.search);
        const backend = params.get("backend") || "wasm";
        if (backend === "wasm") {
          await window.SharecropWasmDemo.install({
            wasmExecURL: "./wasm_exec.js",
            wasmURL: "./sharecrop-wasm-backend.wasm",
          });
        } else {
          throw new Error("unknown Sharecrop demo backend: " + backend);
        }

        const pageOrigin = window.location.origin;
        const app = Elm.Main.init({
          node: document.getElementById("app"),
          flags: {
            origin: pageOrigin && pageOrigin !== "null"
              ? pageOrigin
              : "https://sharecrop.example",
            demo: true,
          },
        });
        app.ports.copyToClipboard.subscribe((t) => {
          if (navigator.clipboard) navigator.clipboard.writeText(t);
        });
        app.ports.reloadDemo.subscribe(() => window.location.reload());
      };
      boot().catch((error) => {
        console.error(error);
        document.getElementById("app").textContent = error.message;
      });
    </script>
  </body>
</html>
